<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <style>
      .title { font: 700 24px sans-serif; fill: #172033; }
      .label { font: 700 18px sans-serif; fill: #172033; }
      .text { font: 16px sans-serif; fill: #334155; }
      .small { font: 14px sans-serif; fill: #475569; }
      .node { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 12; }
      .success { fill: #ecfdf5; stroke: #059669; stroke-width: 3; rx: 12; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#head); }
    </style>
    <marker id="head" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="550" y="38" text-anchor="middle" class="title">Traza de acotamiento en el nodo raíz — instancia pequeña</text>
  <rect x="40" y="90" width="225" height="125" class="node"/>
  <text x="152" y="121" text-anchor="middle" class="label">Nodo raíz</text>
  <text x="152" y="151" text-anchor="middle" class="text">Cota inferior: 0</text>
  <text x="152" y="178" text-anchor="middle" class="text">Sin incumbente</text>
  <text x="152" y="201" text-anchor="middle" class="small">Relajación y presolve</text>
  <rect x="315" y="90" width="225" height="125" class="node"/>
  <text x="427" y="121" text-anchor="middle" class="label">Solución factible</text>
  <text x="427" y="151" text-anchor="middle" class="text">Incumbente: 20</text>
  <text x="427" y="178" text-anchor="middle" class="text">Cota inferior: 0</text>
  <text x="427" y="201" text-anchor="middle" class="small">Polarización real: 2</text>
  <rect x="590" y="90" width="225" height="125" class="node"/>
  <text x="702" y="121" text-anchor="middle" class="label">Cortes y mejora</text>
  <text x="702" y="151" text-anchor="middle" class="text">Incumbente: 10</text>
  <text x="702" y="178" text-anchor="middle" class="text">Cota inferior: 5</text>
  <text x="702" y="201" text-anchor="middle" class="small">Polarización real: 1</text>
  <rect x="865" y="90" width="195" height="125" class="success"/>
  <text x="962" y="121" text-anchor="middle" class="label">Óptimo</text>
  <text x="962" y="151" text-anchor="middle" class="text">LB = UB = 10</text>
  <text x="962" y="178" text-anchor="middle" class="text">Brecha: 0 %</text>
  <text x="962" y="201" text-anchor="middle" class="small">1 nodo explorado</text>
  <path d="M265,152 L310,152" class="arrow"/>
  <path d="M540,152 L585,152" class="arrow"/>
  <path d="M815,152 L860,152" class="arrow"/>
  <rect x="172" y="300" width="756" height="150" class="node"/>
  <text x="550" y="333" text-anchor="middle" class="label">Solución óptima certificada</text>
  <text x="550" y="366" text-anchor="middle" class="text">Movimientos: 1→2 y 3→2 (una persona en cada movimiento)</text>
  <text x="550" y="397" text-anchor="middle" class="text">Distribución final: [1, 2, 1] · mediana: 0.5 · costo: 3</text>
  <text x="550" y="428" text-anchor="middle" class="small">El presolve y los cortes cerraron la brecha en la raíz; no fue necesario ramificar.</text>
</svg>
